<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="canonical" href="{{ page.url | prepend: site.baseurl | prepend: site.url }}" />
  <meta property="og:title" content="{{ page.title }} | {{ site.title }}" />
  <meta property="og:description" content="{{ page.description | default: site.description }}" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
</head>
<body>
  {% include navbar.html %}
  <main class="static-page" id="main-content">
    <div class="static-hero">
      <p class="section-eyebrow">{{ page.eyebrow | default: site.title }}</p>
      <h1>{{ page.title }}</h1>
      {% if page.subtitle %}<p class="static-subtitle">{{ page.subtitle }}</p>{% endif %}
    </div>
    <div class="static-body">
      {{ content }}
    </div>
  </main>
  {% include footer.html %}
  <script src="{{ '/assets/js/nav.js' | relative_url }}"></script>
</body>
</html>
