# Jekyll configuration for GitHub Pages
baseurl: "/dynamicblogandtool"
url: "https://rforrupesh.github.io"

# Site info
title: "Font Generator - Cool Fancy Text"
description: "Font Generator tool to convert text into fancy and custom fonts for social media."

# Build settings
theme: null
plugins: []

# Exclude files not needed in build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md

# Include everything else as-is (passthrough)
include:
  - "*.html"
  - "*.css"
  - "*.js"
  - "*.xml"
  - "*.txt"
  - "*.ico"
  - img
  - tools
  - different-fonts
