title: "FontCraft"
description: "Free font generator, text tools & tips for designers and creators."
url: "https://rforrupesh.github.io"
baseurl: "/dynamicblogandtool"
lang: en
author: "FontCraft Team"

# Blog settings
show_excerpts: true
paginate: 6
paginate_path: "/dynamicblogandtool/blog/page/:num/"

# Plugins (all supported by GitHub Pages)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-seo-tag

# Defaults — every post auto-gets layout & author
defaults:
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      author: "FontCraft Team"
      show_sidebar: true

markdown: kramdown
permalink: /blog/:year/:month/:slug/
