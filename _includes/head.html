<!-- _includes/head.html -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta name="robots" content="{% if page.robots %}{{ page.robots }}{% else %}index, follow{% endif %}">

<!-- Favicon -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ site.baseurl }}/img/favicon.png">
<link rel="icon" type="image/png" sizes="32x32" href="{{ site.baseurl }}/img/favicon.png">
<link rel="icon" type="image/png" sizes="16x16" href="{{ site.baseurl }}/img/favicon.png">
<link rel="shortcut icon" href="{{ site.baseurl }}/favicon.ico">

<!-- Open Graph -->
<meta property="og:type" content="{% if page.og_type %}{{ page.og_type }}{% else %}website{% endif %}">
<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta property="og:image" content="{% if page.og_image %}{{ page.og_image }}{% else %}{{ site.og_image }}{% endif %}">
<meta property="og:url" content="{{ site.url }}{{ page.url }}">

<!-- Twitter Card -->
<meta name="twitter:card" content="{{ site.twitter_card }}">
<meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta name="twitter:image" content="{% if page.og_image %}{{ page.og_image }}{% else %}{{ site.og_image }}{% endif %}">
<meta name="twitter:url" content="{{ site.url }}{{ page.url }}">

<!-- Canonical -->
<link rel="canonical" href="{{ site.url }}{{ page.url }}">

<!-- Stylesheet -->
<link rel="stylesheet" href="{{ site.baseurl }}/style.css">

<!-- AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ site.adsense_client }}" crossorigin="anonymous"></script>

<!-- Google Analytics -->
{% if site.google_analytics %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ site.google_analytics }}');
</script>
{% endif %}

<!-- Page-specific extra head content -->
{% if page.extra_head %}{{ page.extra_head }}{% endif %}
