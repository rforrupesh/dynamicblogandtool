<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Brat Font Generator: Create Stylish Album Art Text</title>
  <meta name="description" content="Generate brat-style album art text. Copy and paste or download your custom design. Fully responsive and free to use.">
  <meta name="robots" content="index, follow">
  <link rel="apple-touch-icon" sizes="180x180" href="/dynamicblogandtool/img/favicon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/dynamicblogandtool/img/favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/dynamicblogandtool/img/favicon.png">
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">

  <style>
    /* ── INTEGRATION STYLES ── */
    :root {
      --brat-bg: #ebebeb;
      --brat-panel: #f4f4f4;
      --brat-card: #ffffff;
      --brat-border: #e0e0e0;
      --brat-accent: #8ace00;
      --brat-text: #111;
    }

    /* Adjusting existing site container for the app */
    .contents {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
      min-height: calc(100vh - 160px);
    }

    /* ── BRAT APP LAYOUT ── */
    .brat-app {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      background: var(--brat-bg);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid var(--brat-border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    /* Left side: Canvas area */
    .brat-canvas-pane {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fff;
      border-radius: 15px;
      padding: 20px;
      min-height: 400px;
    }

    .brat-canvas-wrap {
      position: relative;
      width: 100%;
      max-width: 500px;
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .brat-canvas-wrap:hover { transform: scale(1.02); }
    #mainCanvas { width: 100%; height: 100%; display: block; }

    /* Right side: Controls */
    .brat-controls {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .ctrl-group {
      background: var(--brat-card);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid var(--brat-border);
    }

    .ctrl-label {
      font-family: 'Unbounded', sans-serif;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 10px;
      letter-spacing: 0.1em;
    }

    /* Colors */
    .color-dots { display: flex; gap: 8px; flex-wrap: wrap; }
    .dot {
      width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
      border: 3px solid transparent; transition: 0.2s;
    }
    .dot.active { border-color: #333; transform: scale(1.1); }
    .dot-lime   { background: #8ace00; }
    .dot-black  { background: #111; }
    .dot-white  { background: #fff; border: 1px solid #ddd; }
    .dot-blue   { background: #2244dd; }
    .dot-red    { background: #cc1111; }

    /* Styles */
    .pill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .pill {
      padding: 8px; border-radius: 8px; border: 2px solid var(--brat-border);
      background: #fff; font-family: 'Unbounded', sans-serif; font-size: 10px;
      font-weight: 700; cursor: pointer; transition: 0.2s;
    }
    .pill.active { background: var(--brat-text); color: #fff; border-color: var(--brat-text); }

    /* Presets */
    .presets-list { display: flex; flex-direction: column; gap: 6px; }
    .tpill {
      padding: 8px 12px; border-radius: 8px; border: 1px solid var(--brat-border);
      background: #fff; font-size: 11px; text-align: left; cursor: pointer;
      font-family: 'Unbounded', sans-serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tpill.active { background: var(--brat-accent); }

    /* Textarea */
    textarea {
      width: 100%; height: 80px; padding: 12px; border-radius: 10px;
      border: 2px solid var(--brat-border); font-family: 'Unbounded', sans-serif;
      font-size: 14px; resize: none; outline: none;
    }
    textarea:focus { border-color: var(--brat-accent); }

    .save-btn {
      background: #000; color: #fff; border: none; padding: 15px;
      border-radius: 10px; font-family: 'Unbounded', sans-serif;
      font-weight: 900; cursor: pointer; width: 100%; transition: 0.2s;
    }
    .save-btn:hover { background: #333; }

    /* ── RESPONSIVE OVERRIDES ── */
    @media (max-width: 900px) {
      .brat-app {
        grid-template-columns: 1fr;
      }
      .brat-controls {
        order: 2;
      }
      .brat-canvas-pane {
        order: 1;
        min-height: auto;
      }
    }

    @media (max-width: 600px) {
      .contents { padding: 10px; }
      .brat-app { padding: 12px; border-radius: 0; }
      .pill-grid { grid-template-columns: 1fr 1fr; }
      .color-dots { justify-content: center; }
    }
    
    #exportCanvas { display: none; }
  </style>
</head>
<body>

<script src="/dynamicblogandtool/navbar.js"></script>
<div class="contents">
  <h1 style="text-align: center; margin-bottom: 20px; font-family: 'Unbounded', sans-serif;">Brat Album Cover Generator</h1>
  
  <div class="brat-app">
    <!-- LEFT: Canvas -->
    <div class="brat-canvas-pane">
      <div class="brat-canvas-wrap" id="canvasWrap">
        <canvas id="mainCanvas"></canvas>
      </div>
      <p style="font-size: 11px; margin-top: 10px; color: #888; font-family: 'Unbounded';">Click canvas to download</p>
    </div>

    <!-- RIGHT: Controls -->
    <div class="brat-controls">
      <div class="ctrl-group">
        <div class="ctrl-label">Background Color</div>
        <div class="color-dots">
          <div class="dot dot-lime active" data-bg="#8ace00" data-fg="#111111"></div>
          <div class="dot dot-black" data-bg="#111111" data-fg="#ffffff"></div>
          <div class="dot dot-white" data-bg="#ffffff" data-fg="#111111"></div>
          <div class="dot dot-blue" data-bg="#2244dd" data-fg="#ffffff"></div>
          <div class="dot dot-red" data-bg="#cc1111" data-fg="#ffffff"></div>
        </div>
      </div>

      <div class="ctrl-group">
        <div class="ctrl-label">Visual Style</div>
        <div class="pill-grid">
          <button class="pill active" data-mode="blur">blur</button>
          <button class="pill" data-mode="scribble">scribble</button>
          <button class="pill" data-mode="mirror">mirror</button>
          <button class="pill" data-mode="clean">clean</button>
        </div>
      </div>

      <div class="ctrl-group">
        <div class="ctrl-label">Presets</div>
        <div class="presets-list">
          <button class="tpill active" data-text="brat">brat</button>
          <button class="tpill" data-text="it's the same but there's three more songs">3 more songs</button>
        </div>
      </div>

      <div class="ctrl-group">
        <div class="ctrl-label">Custom Text</div>
        <textarea id="textInput" maxlength="200">brat</textarea>
      </div>

      <button class="save-btn" id="saveBtn">DOWNLOAD PNG</button>
    </div>
  </div>
</div>


<canvas id="exportCanvas"></canvas>

<script>
  // State
  let bgColor = '#8ace00', fgColor = '#111111', mode = 'blur', userText = 'brat';
  
  // Element references
  let mainCanvas, exportCanvas, mc, ec, wrap, textarea;

  // Render logic
  function draw(ctx, s, rawText, m, bg, fg) {
    if (!ctx) return;
    ctx.clearRect(0, 0, s, s);
    ctx.fillStyle = bg; 
    ctx.fillRect(0, 0, s, s);
    
    const t = rawText.toLowerCase().trim() || 'brat';
    if (m === 'blur') drawBlur(ctx, s, t, fg);
    else if (m === 'scribble') drawScribble(ctx, s, t, fg);
    else if (m === 'mirror') drawMirror(ctx, s, t, fg);
    else if (m === 'clean') drawClean(ctx, s, t, fg);
  }

  function render() { 
    if (!mainCanvas) return;
    draw(mc, mainCanvas.width, userText || 'brat', mode, bgColor, fgColor); 
  }

  function resizeCanvas() {
    if (!wrap || !mainCanvas) return;
    const s = wrap.clientWidth;
    mainCanvas.width = mainCanvas.height = s;
    render();
  }

  function wrapLines(ctx, text, maxW) {
    const words = text.split(/\s+/), lines = []; let cur = '';
    for(const w of words) {
      const test = cur ? cur + ' ' + w : w;
      if(ctx.measureText(test).width > maxW && cur) { lines.push(cur); cur = w; }
      else cur = test;
    }
    if(cur) lines.push(cur);
    return lines;
  }

  function bestFontSize(ctx, s, text, maxW, maxFs, minFs) {
    let lo = minFs, hi = maxFs, best = minFs;
    for(let i=0; i<15; i++){
      const mid = (lo+hi)/2; ctx.font = `900 ${mid}px Arial`;
      const lines = wrapLines(ctx, text, maxW), mLW = Math.max(...lines.map(l=>ctx.measureText(l).width)), tH = lines.length*mid*1.2;
      if(mLW <= maxW && tH <= s*0.9) { best = mid; lo = mid; } else hi = mid;
    }
    return best;
  }

  function drawBlur(ctx, s, t, fg) {
    ctx.save();
    const maxW = s * 0.85, fs = bestFontSize(ctx, s, t, maxW, s * 0.18, s * 0.06);
    ctx.font = `900 ${fs}px Arial, sans-serif`;
    ctx.fillStyle = fg; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const lines = wrapLines(ctx, t, maxW), lh = fs * 1.1, totalH = lines.length * lh;
    const sy = s/2 - totalH/2 + lh/2, blurR = s * 0.004, steps = 12;
    ctx.globalAlpha = 1/steps;
    for(let i=0; i<steps; i++){
      const a = (i/steps)*Math.PI*2;
      lines.forEach((ln, li) => ctx.fillText(ln, s/2 + Math.cos(a)*blurR*3, sy + li*lh + Math.sin(a)*blurR*3));
    }
    ctx.restore();
  }

  function drawScribble(ctx, s, t, fg) {
    ctx.save();
    const maxW = s * 0.8, fs = bestFontSize(ctx, s, t, maxW, s * 0.15, s * 0.06);
    ctx.font = `900 ${fs}px Arial, sans-serif`;
    ctx.fillStyle = fg; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const lines = wrapLines(ctx, t, maxW), lh = fs * 1.1, totalH = lines.length * lh, sy = s/2 - totalH/2 + lh/2;
    lines.forEach((ln, li) => ctx.fillText(ln, s/2, sy + li*lh));
    ctx.strokeStyle = fg; ctx.lineWidth = s * 0.003; ctx.globalAlpha = 0.4;
    for(let i=0; i<15; i++) {
      ctx.beginPath();
      ctx.moveTo(0, Math.random()*s); ctx.lineTo(s, Math.random()*s); ctx.stroke();
    }
    ctx.restore();
  }

  function drawMirror(ctx, s, t, fg) {
    ctx.save(); ctx.translate(s, 0); ctx.scale(-1, 1);
    const maxW = s * 0.8, fs = bestFontSize(ctx, s, t, maxW, s * 0.18, s * 0.06);
    ctx.font = `900 ${fs}px Arial, sans-serif`;
    ctx.fillStyle = fg; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const lines = wrapLines(ctx, t, maxW), lh = fs * 1.1, totalH = lines.length * lh;
    lines.forEach((ln, li) => ctx.fillText(ln, s/2, s/2 - totalH/2 + lh/2 + li*lh));
    ctx.restore();
  }

  function drawClean(ctx, s, t, fg) {
    ctx.save();
    const maxW = s * 0.85, fs = bestFontSize(ctx, s, t, maxW, s * 0.2, s * 0.07);
    ctx.font = `900 ${fs}px Arial, sans-serif`;
    ctx.fillStyle = fg; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const lines = wrapLines(ctx, t, maxW), lh = fs * 1.1, totalH = lines.length * lh;
    lines.forEach((ln, li) => ctx.fillText(ln, s/2, s/2 - totalH/2 + lh/2 + li*lh));
    ctx.restore();
  }

  function saveImage() {
    if (!exportCanvas || !ec) return;
    const SIZE = 1080; exportCanvas.width = exportCanvas.height = SIZE;
    draw(ec, SIZE, userText || 'brat', mode, bgColor, fgColor);
    const a = document.createElement('a'); 
    a.download = 'brat-cover.png'; 
    a.href = exportCanvas.toDataURL('image/png'); 
    a.click();
  }

  // Initialization after window load
  window.onload = function() {
    mainCanvas = document.getElementById('mainCanvas');
    exportCanvas = document.getElementById('exportCanvas');
    mc = mainCanvas?.getContext('2d');
    ec = exportCanvas?.getContext('2d');
    wrap = document.getElementById('canvasWrap');
    textarea = document.getElementById('textInput');

    if (textarea) {
      textarea.addEventListener('input', e => {
        userText = e.target.value;
        document.querySelectorAll('.tpill').forEach(b => b.classList.remove('active'));
        render();
      });
    }

    document.querySelectorAll('.dot').forEach(d => {
      d.addEventListener('click', () => {
        document.querySelectorAll('.dot').forEach(x => x.classList.remove('active'));
        d.classList.add('active'); bgColor = d.dataset.bg; fgColor = d.dataset.fg; render();
      });
    });

    document.querySelectorAll('.pill').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
        b.classList.add('active'); mode = b.dataset.mode; render();
      });
    });

    document.querySelectorAll('.tpill').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.tpill').forEach(x => x.classList.remove('active'));
        b.classList.add('active'); userText = b.dataset.text; 
        if(textarea) textarea.value = userText; 
        render();
      });
    });

    const saveBtn = document.getElementById('saveBtn');
    if (saveBtn) saveBtn.addEventListener('click', saveImage);
    if (wrap) wrap.addEventListener('click', saveImage);

    window.addEventListener('resize', resizeCanvas);
    
    // Initial render
    document.fonts.ready.then(() => resizeCanvas());
    resizeCanvas();
  };
</script>

<script src="/dynamicblogandtool/footer.js"></script>

  <script src="/dynamicblogandtool/script.js"></script>
</body>
